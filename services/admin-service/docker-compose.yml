services:
  admin-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sapar
      POSTGRES_PASSWORD: sapar_secret
      POSTGRES_DB: sapar_admin
    ports:
      - '5441:5432'
    volumes:
      - admin-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD', 'pg_isready', '-U', 'sapar', '-d', 'sapar_admin']
      interval: 5s
      timeout: 3s
      retries: 5

  admin-postgres-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sapar
      POSTGRES_PASSWORD: sapar_secret
      POSTGRES_DB: sapar_admin_test
    ports:
      - '5442:5432'
    healthcheck:
      test: ['CMD', 'pg_isready', '-U', 'sapar', '-d', 'sapar_admin_test']
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  admin-pgdata:
