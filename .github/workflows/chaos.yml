# ============================================================================
# Sapar Chaos Tests — manual trigger via workflow_dispatch
# ============================================================================
name: Chaos Tests

on:
  workflow_dispatch:
    inputs:
      scenarios:
        description: 'Scenarios to run (a b c d e, or "all")'
        required: false
        default: 'all'
        type: string

concurrency:
  group: chaos-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  POSTGRES_PASSWORD: chaos-test-password-32chars-long!
  JWT_ACCESS_SECRET: chaos-jwt-secret-at-least-32-characters-long
  JWT_ACCESS_TTL_SEC: "900"
  REFRESH_TOKEN_TTL_SEC: "604800"
  EVENTS_HMAC_SECRET: chaos-events-hmac-at-least-32-characters!!
  PAYMENTS_WEBHOOK_SECRET: chaos-webhook-secret-at-least-32-characters

jobs:
  chaos:
    name: Chaos Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Create .env.docker
        run: |
          cat > .env.docker <<'ENVEOF'
          POSTGRES_PASSWORD=chaos-test-password-32chars-long!
          JWT_ACCESS_SECRET=chaos-jwt-secret-at-least-32-characters-long
          JWT_ACCESS_TTL_SEC=900
          REFRESH_TOKEN_TTL_SEC=604800
          EVENTS_HMAC_SECRET=chaos-events-hmac-at-least-32-characters!!
          PAYMENTS_WEBHOOK_SECRET=chaos-webhook-secret-at-least-32-characters
          GF_ADMIN_USER=admin
          GF_ADMIN_PASSWORD=chaos-grafana-password
          ENVEOF

      - name: Build and start stack
        run: |
          docker compose up -d --build
          echo "Waiting for services to start..."
          sleep 30

      - name: Wait for healthy services
        run: |
          bash scripts/smoke.sh --wait 120 || {
            echo "::warning::Some services did not become healthy"
            docker compose ps
            docker compose logs --tail 30
          }

      - name: Run chaos tests
        run: |
          SCENARIOS="${{ github.event.inputs.scenarios }}"
          if [ "$SCENARIOS" = "all" ] || [ -z "$SCENARIOS" ]; then
            bash scripts/chaos-run.sh
          else
            bash scripts/chaos-run.sh $SCENARIOS
          fi

      - name: Collect logs on failure
        if: failure()
        run: |
          echo "=== Docker Compose PS ==="
          docker compose ps || true
          echo ""
          for svc in api-gateway identity-service trips-service payments-service notifications-service admin-service profiles-service; do
            echo "=== ${svc} logs (last 50 lines) ==="
            docker compose logs --tail 50 "$svc" 2>&1 || true
            echo ""
          done

      - name: Cleanup
        if: always()
        run: docker compose down -v || true
