# ============================================================================
# Sapar CI — path-aware, matrix-based pipeline
# ============================================================================
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  COVERAGE_THRESHOLD: "60"

# ────────────────────────────────────────────────────────────────────────────
# Job A: detect which services were affected
# ────────────────────────────────────────────────────────────────────────────
jobs:
  detect_changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.changes.outputs.services }}
      run_all: ${{ steps.changes.outputs.run_all }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute affected services
        id: changes
        env:
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
        run: bash scripts/changed-services.sh

  # ──────────────────────────────────────────────────────────────────────────
  # Job B: quality gates + Docker build per affected service (matrix)
  # ──────────────────────────────────────────────────────────────────────────
  service_ci:
    name: CI — ${{ matrix.service }}
    needs: detect_changes
    if: needs.detect_changes.outputs.services != '[]'
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect_changes.outputs.services) }}

    # Postgres is needed for prisma migrate deploy / e2e.
    # Redis is lightweight — always started; only api-gateway connects to it.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: sapar
          POSTGRES_PASSWORD: sapar_secret
          POSTGRES_DB: sapar_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sapar -d sapar_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    defaults:
      run:
        working-directory: services/${{ matrix.service }}

    env:
      DATABASE_URL: postgresql://sapar:sapar_secret@localhost:5432/sapar_test
      REDIS_URL: redis://localhost:6379/0
      NODE_ENV: test

    steps:
      # ── checkout + tooling ────────────────────────────────────────────────
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: services/${{ matrix.service }}/package-lock.json

      # ── dependencies ──────────────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── Prisma safety ─────────────────────────────────────────────────────
      - name: Prisma validate
        run: npx prisma validate

      - name: Check migration safety
        working-directory: .
        env:
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
        run: bash scripts/check-migrations.sh ${{ matrix.service }}

      - name: Prisma generate
        run: npx prisma generate

      # ── lint + typecheck ──────────────────────────────────────────────────
      - name: Lint
        run: npx eslint '{src,test}/**/*.ts'

      - name: Typecheck
        run: npx tsc --noEmit

      # ── unit tests + coverage ─────────────────────────────────────────────
      - name: Unit tests
        run: |
          npx jest --runInBand --ci --coverage \
            --coverageReporters=text-summary \
            --coverageReporters=json-summary

      - name: Enforce coverage threshold
        working-directory: .
        run: |
          bash scripts/check-coverage.sh \
            "services/${{ matrix.service }}/coverage/coverage-summary.json" \
            "${{ env.COVERAGE_THRESHOLD }}"

      # ── e2e ───────────────────────────────────────────────────────────────
      - name: Prisma migrate deploy
        run: npx prisma migrate deploy

      - name: E2E tests
        run: npm run test:e2e

      # ── Docker build ──────────────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: services/${{ matrix.service }}
          push: false
          load: true
          tags: sapar/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      # ── smoke test ────────────────────────────────────────────────────────
      - name: Smoke test — container /health
        working-directory: .
        run: |
          case "${{ matrix.service }}" in
            api-gateway)            PORT=3000 ;;
            identity-service)       PORT=3001 ;;
            trips-service)          PORT=3002 ;;
            payments-service)       PORT=3003 ;;
            notifications-service)  PORT=3004 ;;
          esac

          docker run -d --name smoke-test \
            --network host \
            -e PORT="${PORT}" \
            -e NODE_ENV=production \
            -e LOG_LEVEL=warn \
            -e DATABASE_URL="postgresql://sapar:sapar_secret@localhost:5432/sapar_test" \
            -e REDIS_URL="redis://localhost:6379/0" \
            -e JWT_ACCESS_SECRET="ci-smoke-test-secret-at-least-32-characters-long" \
            -e JWT_ACCESS_TTL_SEC=900 \
            -e REFRESH_TOKEN_TTL_SEC=2592000 \
            -e IDENTITY_BASE_URL="http://localhost:3001" \
            -e TRIPS_BASE_URL="http://localhost:3002" \
            -e PAYMENTS_BASE_URL="http://localhost:3003" \
            -e NOTIFICATIONS_BASE_URL="http://localhost:3004" \
            -e HTTP_TIMEOUT_MS=3000 \
            -e MAX_BODY_BYTES=1048576 \
            -e TRUST_PROXY=false \
            -e PSP_TIMEOUT_MS=5000 \
            -e PAYMENTS_WEBHOOK_SECRET="ci-webhook-secret-at-least-32-characters-long" \
            -e RECEIPT_RETRY_N=3 \
            -e RECEIPT_BACKOFF_SEC_LIST="5,30,300" \
            -e RECEIPT_POLL_INTERVAL_MS=60000 \
            -e NOTIF_RETRY_N=3 \
            -e NOTIF_BACKOFF_SEC_LIST="5,30,120" \
            -e WORKER_INTERVAL_MS=60000 \
            -e PROVIDER_TIMEOUT_MS=3000 \
            "sapar/${{ matrix.service }}:${{ github.sha }}"

          for i in $(seq 1 10); do
            if curl -sf "http://localhost:${PORT}/health" > /dev/null 2>&1; then
              echo "✓ /health responded on port ${PORT}"
              docker stop smoke-test
              exit 0
            fi
            echo "Waiting for service… attempt ${i}/10"
            sleep 3
          done

          echo "✗ /health did not respond"
          docker logs smoke-test
          docker stop smoke-test || true
          exit 1

      # ── artifacts ─────────────────────────────────────────────────────────
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.service }}
          path: services/${{ matrix.service }}/coverage/
          retention-days: 7

      - name: Print image info
        if: success()
        run: |
          echo "## Docker Image" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tag:** \`sapar/${{ matrix.service }}:${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          DIGEST=$(docker inspect --format='{{.Id}}' "sapar/${{ matrix.service }}:${{ github.sha }}" 2>/dev/null || echo "n/a")
          echo "- **Digest:** \`${DIGEST}\`" >> "$GITHUB_STEP_SUMMARY"

  # ──────────────────────────────────────────────────────────────────────────
  # Job C (optional): push images — only on main with registry secrets
  # ──────────────────────────────────────────────────────────────────────────
  push_images:
    name: Push — ${{ matrix.service }}
    needs: [detect_changes, service_ci]
    if: >-
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      needs.detect_changes.outputs.services != '[]'
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service: ${{ fromJson(needs.detect_changes.outputs.services) }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to container registry
        if: env.REGISTRY_USERNAME != ''
        env:
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build & push
        if: env.REGISTRY_USERNAME != ''
        env:
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
        uses: docker/build-push-action@v6
        with:
          context: services/${{ matrix.service }}
          push: true
          tags: |
            ${{ secrets.REGISTRY_URL }}/sapar/${{ matrix.service }}:${{ github.sha }}
            ${{ secrets.REGISTRY_URL }}/sapar/${{ matrix.service }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
