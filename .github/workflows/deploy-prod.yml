name: Deploy to Production

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.PROD_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.PROD_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy via SSH
        shell: bash
        run: |
          set -euo pipefail
          ssh -o StrictHostKeyChecking=yes \
              -i ~/.ssh/id_ed25519 \
              "${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }}" \
              "set -euo pipefail; cd ~/Sapar 2>/dev/null || cd ~/sapar; git fetch --all; git reset --hard origin/main; docker compose pull || true; docker compose up -d --build; curl -fsS http://127.0.0.1:3000/health; curl -fsS http://127.0.0.1:3000/ready"

      - name: Cleanup SSH key
        if: always()
        shell: bash
        run: rm -f ~/.ssh/id_ed25519
