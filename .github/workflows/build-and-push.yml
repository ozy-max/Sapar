name: Build and Push Docker Images

on:
  push:
    branches:
      - dev
      - main

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/ozy-max/sapar

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: api-gateway
            context: services/api-gateway
          - name: identity-service
            context: services/identity-service
          - name: trips-service
            context: services/trips-service
          - name: payments-service
            context: services/payments-service
          - name: notifications-service
            context: services/notifications-service
          - name: admin-service
            context: services/admin-service
          - name: profiles-service
            context: services/profiles-service

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine image tag
        id: tags
        run: |
          SHA_SHORT=$(echo "${{ github.sha }}" | head -c 7)
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "env_tag=prod" >> "$GITHUB_OUTPUT"
          else
            echo "env_tag=dev" >> "$GITHUB_OUTPUT"
          fi
          echo "sha_tag=sha-${SHA_SHORT}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service.context }}
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.IMAGE_PREFIX }}-${{ matrix.service.name }}:${{ steps.tags.outputs.env_tag }}
            ${{ env.IMAGE_PREFIX }}-${{ matrix.service.name }}:${{ steps.tags.outputs.sha_tag }}
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service.name }}

  deploy-stage:
    if: github.ref_name == 'dev'
    needs: build
    runs-on: [self-hosted, stage]
    steps:
      - name: Deploy locally on STAGE server
        run: |
          cd /opt/sapar
          echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ozy-max --password-stdin
          export IMAGE_TAG=dev
          docker compose pull
          docker compose up -d
          docker image prune -f
