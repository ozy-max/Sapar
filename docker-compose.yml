services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sapar
      POSTGRES_PASSWORD: sapar_secret
      POSTGRES_DB: sapar_gateway
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD', 'pg_isready', '-U', 'sapar', '-d', 'sapar_gateway']
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://sapar:sapar_secret@postgres:5432/sapar_gateway
      NODE_ENV: development
      LOG_LEVEL: info
      IDENTITY_BASE_URL: http://identity-service:3001
      TRIPS_BASE_URL: http://trips-service:3002
      PAYMENTS_BASE_URL: http://payments-service:3003
      NOTIFICATIONS_BASE_URL: http://notifications-service:3004
      ADMIN_BASE_URL: http://admin-service:3005
      HTTP_TIMEOUT_MS: 3000
      MAX_BODY_BYTES: 1048576
      REDIS_URL: redis://redis:6379/0
      REDIS_TIMEOUT_MS: 500
      TRUST_PROXY: 'false'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  identity-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sapar
      POSTGRES_PASSWORD: sapar_secret
      POSTGRES_DB: sapar_identity
    ports:
      - '5433:5432'
    volumes:
      - identity-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD', 'pg_isready', '-U', 'sapar', '-d', 'sapar_identity']
      interval: 5s
      timeout: 3s
      retries: 5

  identity-service:
    build:
      context: ./services/identity-service
      dockerfile: Dockerfile
    ports:
      - '3001:3001'
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://sapar:sapar_secret@identity-postgres:5432/sapar_identity
      NODE_ENV: development
      LOG_LEVEL: info
      JWT_ACCESS_SECRET: change-me-to-a-random-string-at-least-32-characters
      JWT_ACCESS_TTL_SEC: 900
      REFRESH_TOKEN_TTL_SEC: 2592000
    depends_on:
      identity-postgres:
        condition: service_healthy

  trips-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sapar
      POSTGRES_PASSWORD: sapar_secret
      POSTGRES_DB: sapar_trips
    ports:
      - '5435:5432'
    volumes:
      - trips-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD', 'pg_isready', '-U', 'sapar', '-d', 'sapar_trips']
      interval: 5s
      timeout: 3s
      retries: 5

  trips-service:
    build:
      context: ./services/trips-service
      dockerfile: Dockerfile
    ports:
      - '3002:3002'
    environment:
      PORT: 3002
      DATABASE_URL: postgresql://sapar:sapar_secret@trips-postgres:5432/sapar_trips
      NODE_ENV: development
      LOG_LEVEL: info
      JWT_ACCESS_SECRET: change-me-to-a-random-string-at-least-32-characters
      EVENTS_HMAC_SECRET: sapar-events-hmac-secret-min-32-chars!!
      OUTBOX_TARGETS: booking.created>http://payments-service:3003/internal/events,booking.confirmed>http://payments-service:3003/internal/events,booking.cancelled>http://payments-service:3003/internal/events,booking.expired>http://payments-service:3003/internal/events,trip.cancelled>http://payments-service:3003/internal/events
      BOOKING_TTL_SEC: 900
      EXPIRATION_WORKER_INTERVAL_MS: 1000
    depends_on:
      trips-postgres:
        condition: service_healthy

  payments-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sapar
      POSTGRES_PASSWORD: sapar_secret
      POSTGRES_DB: sapar_payments
    ports:
      - '5437:5432'
    volumes:
      - payments-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD', 'pg_isready', '-U', 'sapar', '-d', 'sapar_payments']
      interval: 5s
      timeout: 3s
      retries: 5

  payments-service:
    build:
      context: ./services/payments-service
      dockerfile: Dockerfile
    ports:
      - '3003:3003'
    environment:
      PORT: 3003
      DATABASE_URL: postgresql://sapar:sapar_secret@payments-postgres:5432/sapar_payments
      NODE_ENV: development
      LOG_LEVEL: info
      JWT_ACCESS_SECRET: change-me-to-a-random-string-at-least-32-characters
      PSP_TIMEOUT_MS: 5000
      PAYMENTS_WEBHOOK_SECRET: change-me-webhook-secret-at-least-32-chars
      RECEIPT_RETRY_N: 3
      RECEIPT_BACKOFF_SEC_LIST: '5,30,300'
      RECEIPT_POLL_INTERVAL_MS: 5000
      EVENTS_HMAC_SECRET: sapar-events-hmac-secret-min-32-chars!!
      OUTBOX_TARGETS: payment.intent.hold_placed>http://trips-service:3002/internal/events,payment.intent.failed>http://trips-service:3002/internal/events,payment.captured>http://notifications-service:3004/internal/events,payment.cancelled>http://notifications-service:3004/internal/events,payment.refunded>http://notifications-service:3004/internal/events
    depends_on:
      payments-postgres:
        condition: service_healthy

  notifications-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sapar
      POSTGRES_PASSWORD: sapar_secret
      POSTGRES_DB: sapar_notifications
    ports:
      - '5439:5432'
    volumes:
      - notifications-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD', 'pg_isready', '-U', 'sapar', '-d', 'sapar_notifications']
      interval: 5s
      timeout: 3s
      retries: 5

  notifications-service:
    build:
      context: ./services/notifications-service
      dockerfile: Dockerfile
    ports:
      - '3004:3004'
    environment:
      PORT: 3004
      DATABASE_URL: postgresql://sapar:sapar_secret@notifications-postgres:5432/sapar_notifications
      NODE_ENV: development
      LOG_LEVEL: info
      JWT_ACCESS_SECRET: change-me-to-a-random-string-at-least-32-characters
      NOTIF_RETRY_N: 5
      NOTIF_BACKOFF_SEC_LIST: '5,30,120,300,900'
      WORKER_INTERVAL_MS: 1000
      PROVIDER_TIMEOUT_MS: 3000
      EVENTS_HMAC_SECRET: sapar-events-hmac-secret-min-32-chars!!
      OUTBOX_TARGETS: ''
    depends_on:
      notifications-postgres:
        condition: service_healthy

  admin-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sapar
      POSTGRES_PASSWORD: sapar_secret
      POSTGRES_DB: sapar_admin
    ports:
      - '5441:5432'
    volumes:
      - admin-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD', 'pg_isready', '-U', 'sapar', '-d', 'sapar_admin']
      interval: 5s
      timeout: 3s
      retries: 5

  admin-service:
    build:
      context: ./services/admin-service
      dockerfile: Dockerfile
    ports:
      - '3005:3005'
    environment:
      PORT: 3005
      DATABASE_URL: postgresql://sapar:sapar_secret@admin-postgres:5432/sapar_admin
      NODE_ENV: development
      LOG_LEVEL: info
      JWT_ACCESS_SECRET: change-me-to-a-random-string-at-least-32-characters
      SLA_RESOLVE_HOURS: 12
    depends_on:
      admin-postgres:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
  identity-pgdata:
  trips-pgdata:
  payments-pgdata:
  notifications-pgdata:
  admin-pgdata:
